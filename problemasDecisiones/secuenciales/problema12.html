<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3.12 - Sueldo con Horas Extra Complejas</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <main class="container">
        <header class="header-section">
            <h1>Problema 3.12</h1>
            <p>Cálculo de sueldo semanal con tabulador de horas extra (dobles y triples). Límite operativo máximo de 50 horas.</p>
        </header>

        <section class="form-section">
            <div class="form-group">
                <label for="txtHorasComplejas">Total de horas trabajadas en la semana:</label>
                <input type="number" id="txtHorasComplejas" min="0" step="0.5" placeholder="Ej. 48">
            </div>

            <div class="form-group">
                <label for="txtPagoComplejo">Pago base por hora ($):</label>
                <input type="number" id="txtPagoComplejo" min="0" step="0.1" placeholder="Ej. 60">
            </div>

            <button class="btn-action" onclick="calcularSueldoComplejo()">Calcular Sueldo</button>

            <div id="wrapperResultado" class="result-box"></div>
        </section>

        <footer>
            <a href="../index.html" class="btn-back">← Volver al menú principal</a>
        </footer>
    </main>

    <script src="../scripts/problema12.js"></script>
</body>
</html>
