<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3.7 - Asignación de Becas</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <main class="container">
        <header class="header-section">
            <h1>Problema 3.7</h1>
            <p>Sistema de cálculo y asignación de becas del Gobierno de la República basado en edad y rendimiento académico.</p>
        </header>

        <section class="form-section">
            <div class="form-group">
                <label for="txtEdadBeca">Edad del estudiante (años):</label>
                <input type="number" id="txtEdadBeca" min="1" max="100" placeholder="Ej. 19">
            </div>

            <div class="form-group">
                <label for="txtPromedioBeca">Promedio obtenido (0.0 - 10.0):</label>
                <input type="number" id="txtPromedioBeca" min="0" max="10" step="0.1" placeholder="Ej. 8.5">
            </div>

            <button class="btn-action" onclick="evaluarBeca()">Evaluar Beca</button>

            <div id="wrapperResultado" class="result-box"></div>
        </section>

        <footer>
            <a href="../index.html" class="btn-back">← Volver al menú principal</a>
        </footer>
    </main>

    <script src="../scripts/problema7.js"></script>
</body>
</html>
