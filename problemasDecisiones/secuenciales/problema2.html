<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3.2 - Cálculo de Sueldo Semanal</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <main class="container">
        <header class="header-section">
            <h1>Problema 3.2</h1>
            <p>Determinar el sueldo semanal de un trabajador considerando que las horas excedentes (más de 40) se pagan al doble.</p>
        </header>

        <section class="form-section">
            <div class="form-group">
                <label for="txtHoras">Horas trabajadas en la semana:</label>
                <input type="number" id="txtHoras" min="0" step="0.5" placeholder="Ej. 45">
            </div>

            <div class="form-group">
                <label for="txtPago">Pago por hora ($):</label>
                <input type="number" id="txtPago" min="0" step="0.1" placeholder="Ej. 50">
            </div>

            <button class="btn-action" onclick="calcularSueldo()">Calcular Sueldo</button>

            <div id="wrapperResultado" class="result-box"></div>
        </section>

        <footer>
            <a href="../index.html" class="btn-back">← Volver al menú principal</a>
        </footer>
    </main>

    <script src="../scripts/problema2.js"></script>
</body>
</html>
