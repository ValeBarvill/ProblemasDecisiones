<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3.3 - Regalo de San Valentín</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <main class="container">
        <header class="header-section">
            <h1>Problema 3.3</h1>
            <p>Determinar qué regalo puedes comprar el 14 de febrero de acuerdo con tu presupuesto disponible.</p>
        </header>

        <section class="form-section">
            <div class="form-group">
                <label for="txtPresupuesto">¿Cuál es tu presupuesto disponible? ($):</label>
                <input type="number" id="txtPresupuesto" min="0" step="0.01" placeholder="Ej. 150.00">
            </div>

            <button class="btn-action" onclick="determinarRegalo()">Determinar Regalo</button>

            <div id="wrapperResultado" class="result-box"></div>
        </section>

        <footer>
            <a href="../index.html" class="btn-back">← Volver al menú principal</a>
        </footer>
    </main>

    <script src="../scripts/problema3.js"></script>
</body>
</html>
