<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3.5 - Persona de Menor Edad</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <main class="container">
        <header class="header-section">
            <h1>Problema 3.5</h1>
            <p>Determinar cuál de las tres personas ingresadas tiene la menor edad.</p>
        </header>

        <section class="form-section">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label>Nombre 1:</label>
                    <input type="text" id="txtNombre1" placeholder="Ej. Ana">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Edad 1:</label>
                    <input type="number" id="txtEdad1" min="0" placeholder="Ej. 25">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label>Nombre 2:</label>
                    <input type="text" id="txtNombre2" placeholder="Ej. Bruno">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Edad 2:</label>
                    <input type="number" id="txtEdad2" min="0" placeholder="Ej. 18">
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 25px;">
                <div class="form-group" style="flex: 2; margin-bottom: 0;">
                    <label>Nombre 3:</label>
                    <input type="text" id="txtNombre3" placeholder="Ej. Carlos">
                </div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;">
                    <label>Edad 3:</label>
                    <input type="number" id="txtEdad3" min="0" placeholder="Ej. 30">
                </div>
            </div>

            <button class="btn-action" onclick="encontrarMenor()">Determinar Menor</button>

            <div id="wrapperResultado" class="result-box"></div>
        </section>

        <footer>
            <a href="../index.html" class="btn-back">← Volver al menú principal</a>
        </footer>
    </main>

    <script src="../scripts/problema5.js"></script>
</body>
</html>
