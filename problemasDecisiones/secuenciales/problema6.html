<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3.6 - Descuento de Artículos</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <main class="container">
        <header class="header-section">
            <h1>Problema 3.6</h1>
            <p>Calcular el porcentaje de descuento y el costo final de un artículo de acuerdo a su precio base.</p>
        </header>

        <section class="form-section">
            <div class="form-group">
                <label for="txtPrecio">Precio original del artículo ($):</label>
                <input type="number" id="txtPrecio" min="0" step="0.01" placeholder="Ej. 150.00">
            </div>

            <button class="btn-action" onclick="calcularDescuentoArticulo()">Calcular Precio Final</button>

            <div id="wrapperResultado" class="result-box"></div>
        </section>

        <footer>
            <a href="../index.html" class="btn-back">← Volver al menú principal</a>
        </footer>
    </main>

    <script src="../scripts/problema6.js"></script>
</body>
</html>
