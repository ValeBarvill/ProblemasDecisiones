<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problema 3.10 - Planificador de Vacaciones</title>
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>

    <main class="container">
        <header class="header-section">
            <h1>Problema 3.10</h1>
            <p>Sistema de presupuesto vacacional en autobuses "La Tortuga" para calcular el destino ideal (viaje redondo) o la estancia en casa.</p>
        </header>

        <section class="form-section">
            <div class="form-group">
                <label for="txtPresupuestoVacaciones">Tu presupuesto disponible ($):</label>
                <input type="number" id="txtPresupuestoVacaciones" min="0" step="0.5" placeholder="Ej. 5000">
            </div>

            <div class="form-group">
                <label for="txtCostoKilometro">Costo de pasaje por kilómetro recorrido ($/km):</label>
                <input type="number" id="txtCostoKilometro" min="0" step="0.1" placeholder="Ej. 1.5">
            </div>

            <button class="btn-action" onclick="planificarVacaciones()">Calcular Destino</button>

            <div id="wrapperResultado" class="result-box"></div>
        </section>

        <footer>
            <a href="../index.html" class="btn-back">← Volver al menú principal</a>
        </footer>
    </main>

    <script src="../scripts/problema10.js"></script>
</body>
</html>
